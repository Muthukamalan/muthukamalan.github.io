<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV Preview</title>

  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; frame-src 'self' player.vimeo.com https://www.youtube-nocookie.com;">

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
    }
    .pdf-wrap {
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    iframe {
      width: 100%;
      height: 90vh;
      border: 1px solid #30363d;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <div class="pdf-wrap">
    <h1>CV</h1>
    <iframe src="/cv.pdf" title="CV PDF preview"></iframe>
  </div>

</body>
</html>
